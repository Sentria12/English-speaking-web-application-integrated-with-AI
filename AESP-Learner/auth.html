<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AESP - Đăng nhập / Đăng ký</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <i class="fas fa-microphone-alt"></i>
                <h1>AESP</h1>
            </div>
            <a href="index.html" class="btn-outline">Trang chủ</a>
        </header>

        <section class="auth-wrapper">
            <div class="auth-card">
                <h2 id="auth-title">Chào mừng đến AESP</h2>
                <p class="auth-subtitle">Luyện nói tiếng Anh tự tin với AI</p>
                <div class="auth-toggle">
                    <button id="login-tab" class="tab-active">Đăng nhập</button>
                    <button id="register-tab">Đăng ký</button>
                </div>

                <form id="login-form" class="auth-form">
                    <div class="input-group">
                        <input type="text" id="login-username" placeholder="Tên đăng nhập" required>
                    </div>
                    <div class="input-group password-group">
                        <input type="password" id="login-password" placeholder="Mật khẩu" required>
                        <i class="fas fa-eye toggle-password" data-target="login-password"></i>
                    </div>
                    <button type="submit" class="btn-primary">Đăng nhập</button>
                </form>

                <form id="register-form" class="auth-form hidden">
                    <div class="input-group">
                        <input type="text" id="reg-username" placeholder="Tên đăng nhập" required>
                    </div>
                    <div class="input-group">
                        <input type="email" id="reg-email" placeholder="Email" required>
                    </div>
                    <div class="input-group password-group">
                        <input type="password" id="reg-password" placeholder="Mật khẩu" required>
                        <i class="fas fa-eye toggle-password" data-target="reg-password"></i>
                    </div>
                    <div class="input-group password-group">
                        <input type="password" id="reg-confirm" placeholder="Xác nhận mật khẩu" required>
                        <i class="fas fa-eye toggle-password" data-target="reg-confirm"></i>
                    </div>
                    <button type="submit" class="btn-primary">Đăng ký ngay</button>
                </form>

                <p id="auth-error" class="error"></p>
                <p id="auth-success" class="success hidden"></p>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
