<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AESP - Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <i class="fas fa-microphone-alt"></i>
                <h1>AESP</h1>
            </div>
            <button id="logout-btn" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
        </header>

        <div class="dashboard">
            <aside class="sidebar">
                <nav>
                    <a href="#assessment" class="nav-item active"><i class="fas fa-clipboard-check"></i> Đánh giá đầu vào</a>
                    <a href="#packages" class="nav-item"><i class="fas fa-shopping-cart"></i> Gói dịch vụ</a>
                    <a href="#practice" class="nav-item"><i class="fas fa-comments"></i> Luyện nói</a>
                    <a href="#progress" class="nav-item"><i class="fas fa-chart-line"></i> Tiến độ</a>
                    <a href="#reports" class="nav-item"><i class="fas fa-file-alt"></i> Báo cáo</a>
                </nav>
            </aside>

            <main class="main-content">
                <div id="content-area">
                    <!-- Nội dung load từ file riêng -->
                    <p style="text-align:center;padding:100px;color:#666;">Đang tải nội dung...</p>
                </div>
            </main>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
