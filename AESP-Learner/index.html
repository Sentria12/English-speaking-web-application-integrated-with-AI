<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AESP - Đăng nhập</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      </header>
      <section id="auth-section" class="card">
        <h2 id="auth-title">Chào mừng đến AESP</h2>
        <p class="subtitle">Luyện nói tiếng Anh tự tin với AI</p>

        <div class="auth-toggle">
          <button id="login-tab" class="tab-active">Đăng nhập</button>
          <button id="register-tab">Đăng ký</button>
        </div>

        <form id="login-form" class="auth-form">
          <input
            id="login-username"
            type="text"
            placeholder="Tên đăng nhập"
            required
          />
          <input
            id="login-password"
            type="password"
            placeholder="Mật khẩu"
            required
          />
          <button type="submit" class="btn-primary">Đăng nhập</button>
          <p id="auth-error" class="error"></p>
        </form>

        <form id="register-form" class="auth-form hidden">
          <input
            id="reg-username"
            type="text"
            placeholder="Tên đăng nhập"
            required
          />
          <input id="reg-email" type="email" placeholder="Email" required />
          <input
            id="reg-password"
            type="password"
            placeholder="Mật khẩu"
            required
          />
          <input
            id="reg-confirm"
            type="password"
            placeholder="Xác nhận mật khẩu"
            required
          />
          <button type="submit" class="btn-primary">Đăng ký ngay</button>
        </form>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
