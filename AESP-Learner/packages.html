<div class="card">
    <h2>Chọn Gói Dịch Vụ Phù hợp</h2>
    <div class="packages-grid">
        <div class="package-card">
            <h3>Basic</h3>
            <p class="price">200.000 <span class="currency">VNĐ/tháng</span></p>
            <ul class="package-features">
                <li>AI hỗ trợ luyện nói</li>
                <li>Gợi ý từ vựng & câu</li>
                <li>Theo dõi tiến độ cơ bản</li>
            </ul>
            <button data-package="basic" class="btn-package">Chọn gói</button>
        </div>
        <div class="package-card premium">
            <div class="badge">Phổ biến</div>
            <h3>Premium</h3>
            <p class="price">500.000 <span class="currency">VNĐ/tháng</span></p>
            <ul class="package-features">
                <li>Tất cả tính năng Basic</li>
                <li>Mentor hỗ trợ trực tiếp</li>
                <li>Phản hồi chi tiết</li>
                <li>Báo cáo nâng cao</li>
            </ul>
            <button data-package="premium" class="btn-package">Chọn gói</button>
        </div>
    </div>
    <p id="purchase-status" class="status"></p>
</div>
