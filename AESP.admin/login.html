<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - AESP Admin</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Login Page -->
    <div class="login-page">
        <div class="login-background">
            <div class="bubble bubble-1"></div>
            <div class="bubble bubble-2"></div>
            <div class="bubble bubble-3"></div>
        </div>

        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <div class="logo-circle">A</div>
                </div>
                <h1 class="login-title">AESP Admin</h1>
                <p class="login-subtitle">Đăng nhập vào hệ thống quản trị</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label class="form-label">
                        <span class="label-icon">✉️</span>
                        Email
                    </label>
                    <input 
                        type="email" 
                        class="form-input" 
                        id="email" 
                        placeholder="admin@aesp.com" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label">
                        <span class="label-icon">🔒</span>
                        Mật khẩu
                    </label>
                    <input 
                        type="password" 
                        class="form-input" 
                        id="password" 
                        placeholder="••••••••" 
                        required
                    >
                </div>

                <button type="submit" class="btn-login">
                    <span>Đăng nhập</span>
                    <span class="btn-arrow">→</span>
                </button>

                <div class="login-footer">
                    <p class="demo-info">
                        <span class="info-icon">ℹ️</span>
                        Demo: <strong>admin@aesp.com</strong> / <strong>123456</strong>
                    </p>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Login Handler
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Demo credentials
            if (email === 'admin@aesp.com' && password === '123456') {
                // Save login state
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userEmail', email);
                
                // Redirect to dashboard
                window.location.href = 'dashboard.html';
            } else {
                alert('❌ Email hoặc mật khẩu không đúng!\n\nVui lòng sử dụng:\nEmail: admin@aesp.com\nMật khẩu: 123456');
            }
        });

        // Check if already logged in
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
