<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - AESP System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ===== CSS RIÊNG CHO TRANG LOGIN ===== */
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --text-dark: #1f2937;
            --text-gray: #6b7280;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f3f4f6;
            overflow: hidden; /* Tránh thanh cuộn do hiệu ứng nền */
            position: relative;
        }

        /* Hiệu ứng nền Abstract Blobs */
        .background-shapes {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
            top: 0; left: 0;
        }

        .shape {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
            animation: float 10s infinite alternate;
        }

        .shape-1 {
            top: -10%; left: -10%;
            width: 500px; height: 500px;
            background: #c084fc;
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
        }

        .shape-2 {
            bottom: -10%; right: -5%;
            width: 400px; height: 400px;
            background: #60a5fa;
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            animation-delay: -2s;
        }

        .shape-3 {
            top: 40%; left: 40%;
            width: 300px; height: 300px;
            background: #f472b6;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            animation-delay: -4s;
            opacity: 0.4;
        }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(30px, 20px) rotate(10deg); }
        }

        /* Login Card - Glassmorphism */
        .login-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            margin: 20px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: var(--bg-gradient);
            color: white;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            margin: 0 auto 16px;
            box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3);
        }

        .login-header h1 {
            font-size: 24px;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .login-header p {
            color: var(--text-gray);
            font-size: 14px;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-dark);
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-gray);
            font-size: 18px;
            transition: color 0.3s;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px 14px 48px; /* padding-left lớn để né icon */
            border: 2px solid transparent;
            background: #f9fafb;
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s;
            outline: none;
        }

        .form-input:focus {
            background: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .form-input:focus + .input-icon {
            color: var(--primary);
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-gray);
            font-size: 16px;
        }

        .toggle-password:hover {
            color: var(--primary);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--bg-gradient);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
            font-family: inherit;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .login-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 14px;
            color: var(--text-gray);
        }

        .login-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        .demo-credentials {
            margin-top: 24px;
            padding: 12px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 8px;
            font-size: 12px;
            color: var(--secondary);
            text-align: center;
            border: 1px dashed var(--primary);
        }

        /* Responsive Mobile */
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 24px;
            }
        }
    </style>
</head>
<body>

    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="login-card">
        <div class="login-header">
            <div class="logo-icon">
                <i class="fas fa-microphone-alt"></i>
            </div>
            <h1>AESP System</h1>
            <p>Đăng nhập để quản lý hệ thống</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">Email / Tài khoản</label>
                <div class="input-wrapper">
                    <input type="text" class="form-input" id="email" placeholder="admin@aesp.com" required>
                    <i class="fas fa-envelope input-icon"></i>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Mật khẩu</label>
                <div class="input-wrapper">
                    <input type="password" class="form-input" id="password" placeholder="••••••••" required>
                    <i class="fas fa-lock input-icon"></i>
                    <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                </div>
            </div>

            <button type="submit" class="btn-login">Đăng nhập ngay</button>

            <div class="demo-credentials">
                <strong>Demo Admin:</strong> admin@aesp.com / 123456 <br>
                <strong>Demo Learner:</strong> user / 123
            </div>

            <div class="login-footer">
                <p>Bạn là học viên mới? <a href="#">Đăng ký tài khoản</a></p>
                <p style="margin-top: 8px;"><a href="#">Quên mật khẩu?</a></p>
            </div>
        </form>
    </div>

    <script>
        // 1. Logic ẩn/hiện mật khẩu
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Đổi icon mắt
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        // 2. Xử lý Đăng nhập
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Logic đơn giản để điều hướng (Demo)
            if (email.includes('admin') && password === '123456') {
                // Lưu session
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userEmail', email);
                localStorage.setItem('role', 'admin');
                
                // Hiệu ứng nút bấm trước khi chuyển trang
                const btn = document.querySelector('.btn-login');
                btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Đang xử lý...';
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);

            } else {
                alert('❌ Thông tin đăng nhập không đúng!\n\nGợi ý: admin@aesp.com / 123456');
            }
        });
    </script>
</body>
</html>
